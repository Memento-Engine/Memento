name: Build and Release

# Triggered on:
#   - push to main         → runs all build jobs (CI validation only, no release)
#   - workflow_dispatch    → builds + tests + creates atomic tag + release
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.3 or 1.2.3-rc.1)'
        required: true
        type: string
      create_delta:
        description: 'Create delta patches from previous release'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  SERVICE_NAME: SearchEngineDaemon
  RELEASE_REPO: ${{ github.repository }}

# ─────────────────────────────────────────────────────────────
# JOB ORDER:
#
#   validate-policy
#       │
#       ├── build-frontend
#       ├── build-agents
#       ├── build-daemon
#       ├── build-service-helper
#       └── build-tauri
#               │
#               ▼
#        package-release     ← pack only, no release creation
#               │
#               ▼
#         test-service        ← test the package BEFORE publishing
#               │
#               ▼
#        create-release       ← atomic tag + release, only if tests pass
# ─────────────────────────────────────────────────────────────

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. VALIDATE POLICY
  #    - Determines whether this run should produce a release
  #    - Validates version format and secrets (dispatch only)
  #    - Prints last release so you know what version to bump from
  # ─────────────────────────────────────────────────────────────
  validate-policy:
    runs-on: windows-latest
    outputs:
      run_packaging: ${{ steps.policy.outputs.run_packaging }}
      version: ${{ steps.policy.outputs.version }}
      is_prerelease: ${{ steps.policy.outputs.is_prerelease }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine build policy
        id: policy
        shell: pwsh
        run: |
          $event = "${{ github.event_name }}"
          $runPackaging = $false
          $version = ""
          $isPrerelease = $false

          if ($event -eq "workflow_dispatch") {
            $runPackaging = $true
            $version = "${{ github.event.inputs.version }}".TrimStart('v')

            # Validate version format: 1.2.3 or 1.2.3-rc.1 etc.
            if ($version -notmatch '^\d+\.\d+\.\d+(-[a-zA-Z0-9.]+)?$') {
              throw "Invalid version format: '$version'. Expected: 1.2.3 or 1.2.3-rc.1"
            }

            # Detect pre-release suffix
            if ($version -match '[-.](alpha|beta|rc)') {
              $isPrerelease = $true
            }
          }
          # Push to main: run all build jobs for CI validation only — no packaging or release.

          echo "run_packaging=$($runPackaging.ToString().ToLower())" >> $env:GITHUB_OUTPUT
          echo "version=$version"                                    >> $env:GITHUB_OUTPUT
          echo "is_prerelease=$($isPrerelease.ToString().ToLower())" >> $env:GITHUB_OUTPUT

      # Only runs on workflow_dispatch — no point checking secrets on plain push
      - name: Show last release + validate secrets
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          TAURI_SENTRY_DSN: ${{ secrets.TAURI_SENTRY_DSN }}
          MEMENTO_UPDATE_URL: ${{ secrets.MEMENTO_UPDATE_URL }}
          SENTRY_RELEASE: ${{ secrets.SENTRY_RELEASE }}
          MEMENTO_ENV: ${{ secrets.MEMENTO_ENV }}
        run: |
          # Print last release so you can sanity-check your version bump
          $lastTag = gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>$null
          if ($lastTag) {
            Write-Host "Last release : $lastTag"
          } else {
            Write-Host "Last release : (none — this will be the first)"
          }
          Write-Host "New release  : v${{ github.event.inputs.version }}"

          # Validate required secrets
          $errors = @()
          if (-not $env:SENTRY_DSN)         { $errors += "SENTRY_DSN is not set" }
          if (-not $env:TAURI_SENTRY_DSN)   { $errors += "TAURI_SENTRY_DSN is not set" }
          if (-not $env:MEMENTO_UPDATE_URL)  { $errors += "MEMENTO_UPDATE_URL is not set" }
          if (-not $env:SENTRY_RELEASE)     { $errors += "SENTRY_RELEASE is not set" }
          if (-not $env:MEMENTO_ENV)        { $errors += "MEMENTO_ENV is not set" }

          if ($errors.Count -gt 0) {
            foreach ($err in $errors) { Write-Error $err }
            exit 1
          }

          Write-Host "All required secrets are set."

  # ─────────────────────────────────────────────────────────────
  # 2. BUILD JOBS (run in parallel)
  # ─────────────────────────────────────────────────────────────
  build-frontend:
    needs: validate-policy
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            app/frontend/package-lock.json
            shared/package-lock.json

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: app/frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('app/frontend/package-lock.json') }}-${{ hashFiles('app/frontend/**/*.[jt]s', 'app/frontend/**/*.[jt]sx', 'app/frontend/**/*.mjs', 'app/frontend/**/*.css', 'shared/types/**/*.ts') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('app/frontend/package-lock.json') }}-

      - name: Install app dependencies
        run: cd app && npm ci

      - name: Install shared dependencies
        run: cd shared && npm ci

      - name: Install frontend dependencies
        run: cd app/frontend && npm ci

      - name: Build frontend
        run: cd app/frontend && npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-out
          path: app/frontend/out/
          if-no-files-found: error
          retention-days: 5

  build-agents:
    needs: validate-policy
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/agents/package-lock.json

      - name: Install agents dependencies
        run: cd app/agents && npm ci

      - name: Build agents executable
        run: cd app/agents && npm run build:exe

      - name: Upload agents artifact
        uses: actions/upload-artifact@v4
        with:
          name: agents-bin
          path: app/agents/dist/memento-agents.exe
          retention-days: 5

  build-daemon:
    needs: validate-policy
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Build daemon (Release)
        run: cargo build --release -p memento-daemon

      - name: Collect daemon artifacts
        run: |
          New-Item -ItemType Directory -Force -Path out-daemon
          Copy-Item "target/release/memento-daemon.exe" "out-daemon/"

          # Include DirectML.dll if present for ONNX Runtime GPU support
          $ortBinDir = Get-ChildItem -Path "$env:LOCALAPPDATA\ort.pyke.io\dfbin\x86_64-pc-windows-msvc" `
            -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($ortBinDir) {
            $directMlDll = Join-Path $ortBinDir.FullName "DirectML.dll"
            if (Test-Path $directMlDll) {
              Copy-Item $directMlDll "out-daemon/"
            }
          }

      - name: Upload daemon artifact
        uses: actions/upload-artifact@v4
        with:
          name: daemon-bin
          path: out-daemon/*
          retention-days: 5

  build-service-helper:
    needs: validate-policy
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Build service-helper (Release)
        run: cargo build --release -p service-helper

      - name: Upload service-helper artifact
        uses: actions/upload-artifact@v4
        with:
          name: service-helper-bin
          path: target/release/service-helper.exe
          retention-days: 5

  build-tauri:
    needs: [validate-policy, build-frontend, build-agents]
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-out
          path: app/frontend/out

      - name: Install app dependencies
        run: cd app && npm ci

      - name: Download agents artifact
        uses: actions/download-artifact@v4
        with:
          name: agents-bin
          path: artifacts/agents

      - name: Stage agents binary for Tauri externalBin
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path app/agents/dist
          Copy-Item "artifacts/agents/memento-agents.exe" "app/agents/dist/memento-agents-x86_64-pc-windows-msvc.exe"

      - name: Build Tauri app (Release)
        run: cd app && npm exec tauri build -- --no-bundle --config src-tauri/tauri.ci.conf.json

      - name: Upload Tauri artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bin
          path: target/release/tauri-app.exe
          retention-days: 5

  # ─────────────────────────────────────────────────────────────
  # 3. PACKAGE — assemble + velopack pack only, NO release yet
  # ─────────────────────────────────────────────────────────────
  package-release:
    needs:
      - validate-policy
      - build-frontend
      - build-agents
      - build-daemon
      - build-service-helper
      - build-tauri
    runs-on: windows-latest
    if: ${{ needs.validate-policy.outputs.run_packaging == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET (for Velopack CLI)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Download daemon artifact
        uses: actions/download-artifact@v4
        with:
          name: daemon-bin
          path: artifacts/daemon

      - name: Download agents artifact
        uses: actions/download-artifact@v4
        with:
          name: agents-bin
          path: artifacts/agents

      - name: Download service-helper artifact
        uses: actions/download-artifact@v4
        with:
          name: service-helper-bin
          path: artifacts/service-helper

      - name: Download tauri artifact
        uses: actions/download-artifact@v4
        with:
          name: tauri-bin
          path: artifacts/tauri

      - name: Prepare release folder
        run: |
          New-Item -ItemType Directory -Force -Path release-staging

          Copy-Item "artifacts/tauri/tauri-app.exe"            "release-staging/memento.exe"
          Copy-Item "artifacts/daemon/memento-daemon.exe"      "release-staging/"
          Copy-Item "artifacts/agents/memento-agents.exe"      "release-staging/"
          Copy-Item "artifacts/service-helper/service-helper.exe" "release-staging/"

          if (Test-Path "artifacts/daemon/DirectML.dll") {
            Write-Host "Copying DirectML.dll for ONNX Runtime GPU support"
            Copy-Item "artifacts/daemon/DirectML.dll" "release-staging/"
          } else {
            Write-Warning "DirectML.dll not found - GPU acceleration may not work"
          }

          if (Test-Path "app/src-tauri/icons") {
            Copy-Item -Recurse "app/src-tauri/icons" "release-staging/"
          }

      - name: Download previous release (for delta patches)
        if: ${{ github.event.inputs.create_delta != 'false' }}
        continue-on-error: true
        shell: pwsh
        run: |
          $prevRelease = gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>$null
          if ($prevRelease) {
            Write-Host "Downloading previous release: $prevRelease"
            New-Item -ItemType Directory -Force -Path previous-release
            gh release download $prevRelease -D previous-release -p "*.nupkg" 2>$null
          } else {
            Write-Host "No previous release found — skipping delta patch."
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pack with Velopack
        shell: pwsh
        run: |
          $version = "${{ needs.validate-policy.outputs.version }}"
          $createDelta = "${{ github.event.inputs.create_delta }}" -ne "false"
          $packArgs = @(
            "pack",
            "--packId",      "Memento",
            "--packVersion", $version,
            "--packDir",     "release-staging",
            "--mainExe",     "memento.exe",
            "--outputDir",   "velopack-output",
            "--delta",       $(if ($createDelta) { "BestSpeed" } else { "None" })
          )

          $prevPkg = Get-ChildItem "previous-release/*-full.nupkg" -ErrorAction SilentlyContinue |
                     Select-Object -First 1

          vpk @packArgs

          # Generate explicit delta package when a previous full package exists.
          if ($createDelta -and $prevPkg) {
            $newPkg = Get-ChildItem "velopack-output/*-full.nupkg" -ErrorAction SilentlyContinue |
                      Sort-Object LastWriteTime -Descending |
                      Select-Object -First 1
            if ($newPkg) {
              Write-Host "Delta source: $($prevPkg.FullName)"
              $deltaName = $newPkg.Name -replace "-full\.nupkg$", "-delta.nupkg"
              $deltaPath = Join-Path "velopack-output" $deltaName
              vpk delta generate --mode BestSpeed --base $prevPkg.FullName --new $newPkg.FullName --output $deltaPath
            }
          }

      - name: Guard — ensure output files exist
        shell: pwsh
        run: |
          $files = Get-ChildItem "velopack-output" -ErrorAction SilentlyContinue
          if (-not $files -or $files.Count -eq 0) {
            throw "velopack-output is empty — pack step failed silently. Aborting."
          }
          Write-Host "Packed $($files.Count) file(s):"
          $files | ForEach-Object { Write-Host "  $($_.Name)" }

      - name: Upload Velopack artifacts
        uses: actions/upload-artifact@v4
        with:
          name: velopack-release
          path: velopack-output/*
          retention-days: 5

  # ─────────────────────────────────────────────────────────────
  # 4. TEST — validate the package BEFORE it goes public
  #    If this fails, no release is created. Nothing to clean up.
  # ─────────────────────────────────────────────────────────────
  test-service:
    needs: [validate-policy, package-release]
    runs-on: windows-latest
    if: ${{ needs.validate-policy.outputs.run_packaging == 'true' }}

    steps:
      - name: Download Velopack artifacts
        uses: actions/download-artifact@v4
        with:
          name: velopack-release
          path: test-install

      - name: Test installation package
        shell: pwsh
        run: |
          # Velopack outputs:  *-Setup.exe  and  *-full.nupkg  (plus JSON feed files).
          # Verify both are present before allowing the release to be created.
          $setup = Get-ChildItem "test-install" -Filter "*Setup*.exe" -ErrorAction SilentlyContinue |
                   Select-Object -First 1
          $nupkg = Get-ChildItem "test-install" -Filter "*.nupkg" -ErrorAction SilentlyContinue |
                   Select-Object -First 1

          $errors = @()
          if ($setup) {
            Write-Host "Installer  : $($setup.Name) ($($setup.Length) bytes)"
          } else {
            $errors += "No *Setup*.exe found in Velopack output"
          }
          if ($nupkg) {
            Write-Host "Package    : $($nupkg.Name) ($($nupkg.Length) bytes)"
          } else {
            $errors += "No *.nupkg found in Velopack output"
          }

          Write-Host "All artifact files:"
          Get-ChildItem "test-install" | ForEach-Object { Write-Host "  $($_.Name)" }

          if ($errors.Count -gt 0) {
            foreach ($err in $errors) { Write-Error $err }
            exit 1
          }

  # ─────────────────────────────────────────────────────────────
  # 5. RELEASE — atomic tag + GitHub release, only after tests pass
  #
  #    - Uses github.sha so the tag always points to the exact
  #      commit that was built and tested, not whatever HEAD is now.
  #    - Idempotent: if the release already exists (e.g. asset
  #      upload failed mid-way on a previous run), only re-uploads
  #      assets — does not recreate the tag or release.
  # ─────────────────────────────────────────────────────────────
  create-release:
    needs: [validate-policy, test-service]
    runs-on: windows-latest
    if: ${{ needs.validate-policy.outputs.run_packaging == 'true' }}

    steps:
      - name: Download Velopack artifacts
        uses: actions/download-artifact@v4
        with:
          name: velopack-release
          path: velopack-output

      - name: Create GitHub Release (atomic tag + release)
        shell: pwsh
        run: |
          $version     = "${{ needs.validate-policy.outputs.version }}"
          $tagName     = "v$version"
          $isPrerelease = "${{ needs.validate-policy.outputs.is_prerelease }}"
          $sha         = "${{ github.sha }}"
          $repo        = "${{ github.repository }}"

          $files = Get-ChildItem "velopack-output" -File | ForEach-Object { $_.FullName }
          if ($files.Count -eq 0) {
            throw "No files found in velopack-output — aborting release."
          }

          # Idempotent: if release exists (e.g. asset upload failed on a prior run),
          # skip tag/release creation and only re-upload assets.
          # gh is an external binary — it signals failure via exit code, not exceptions,
          # so we check $LASTEXITCODE rather than using try/catch.
          $null = gh release view $tagName --repo $repo --json id 2>$null
          $releaseExists = ($LASTEXITCODE -eq 0)

          if ($releaseExists) {
            Write-Host "Release $tagName already exists — uploading/replacing assets only."
            gh release upload $tagName @files --repo $repo --clobber
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } else {
            Write-Host "Creating release $tagName on commit $sha"
            $createArgs = @(
              $tagName,
              "--repo",           $repo,
              "--title",          "Memento AI $version",
              "--generate-notes",
              "--target",         $sha        # exact tested commit — never points to wrong HEAD
            )
            if ($isPrerelease -eq "true") {
              $createArgs += "--prerelease"
            }
            $createArgs += $files
            gh release create @createArgs
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

          Write-Host "Done. Release: https://github.com/${{ github.repository }}/releases/tag/$tagName"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}