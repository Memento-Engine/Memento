# Reusable workflow: Unit and contract tests
# Called by tier workflows

name: Unit Tests

on:
  workflow_call:
    inputs:
      os_matrix:
        description: 'JSON array of OS versions to test on'
        type: string
        default: '["windows-latest"]'

jobs:
  # ─────────────────────────────────────────────────────────────
  # #2 — Contract test: daemon launch mode mapping
  # Unit test asserts every start/stop call site passes
  # isDev: !isDesktopProductionMode()
  # ─────────────────────────────────────────────────────────────
  daemon-mode-contract:
    name: '#2 Daemon Launch Mode Contract'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(inputs.os_matrix) }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        run: cd app/frontend && npm ci

      - name: Run daemon mode contract tests
        run: |
          cd app/frontend
          npm test -- --testPathPattern="daemon-launch-mode|daemon-mode-contract" --passWithNoTests
        env:
          CI: true

  # Frontend unit tests (catches regressions in mode detection)
  frontend-unit-tests:
    name: 'Frontend Unit Tests'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(inputs.os_matrix) }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        run: cd app/frontend && npm ci

      - name: Run unit tests
        run: |
          cd app/frontend
          npm test -- --passWithNoTests
        env:
          CI: true

  # Rust unit tests
  rust-unit-tests:
    name: 'Rust Unit Tests'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(inputs.os_matrix) }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Run Rust tests
        run: cargo test --workspace
