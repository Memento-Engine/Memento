# ═══════════════════════════════════════════════════════════════════════════
# TIER 3 — test branch (production artifacts, not public)
# ═══════════════════════════════════════════════════════════════════════════
# Windows 10 + 11 matrix (~30 min)
# All develop/staging checks, plus production simulation and installer tests.
#
# Additional checks:
#   #6 — Startup-path diagnostics
#   #8 — Production simulation stage
#   #10 — Installer smoke test (clean Windows VM)
# ═══════════════════════════════════════════════════════════════════════════

name: 'CI: Tier 3 - Test'

on:
  push:
    branches:
      - test
      - 'test/**'
  pull_request:
    branches:
      - test

permissions:
  contents: read

concurrency:
  group: tier3-${{ github.ref }}
  cancel-in-progress: true

env:
  OS_MATRIX: '["windows-2019", "windows-latest"]'

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # TIER 1 CHECKS (inherited)
  # ═══════════════════════════════════════════════════════════════════════════
  
  lint-checks:
    name: 'Tier 1: Lint & Static Analysis'
    uses: ./.github/workflows/_reusable-lint-checks.yml
    with:
      fail_fast: true

  unit-tests:
    name: 'Tier 1: Unit & Contract Tests'
    uses: ./.github/workflows/_reusable-unit-tests.yml
    with:
      os_matrix: '["windows-2019", "windows-latest"]'

  # ═══════════════════════════════════════════════════════════════════════════
  # TIER 2 CHECKS (inherited)
  # ═══════════════════════════════════════════════════════════════════════════

  build-checks:
    name: 'Tier 2: Build & Binary Check'
    needs: [lint-checks]
    uses: ./.github/workflows/_reusable-build-checks.yml
    with:
      os_matrix: '["windows-2019", "windows-latest"]'
      upload_artifacts: true

  e2e-smoke:
    name: 'Tier 2: E2E Smoke Test'
    needs: [build-checks]
    uses: ./.github/workflows/_reusable-e2e-tests.yml
    with:
      os_matrix: '["windows-2019", "windows-latest"]'
      run_installer_test: false
      run_production_simulation: false
      run_startup_diagnostics: false

  # ═══════════════════════════════════════════════════════════════════════════
  # TIER 3 CHECKS — Production-grade validation
  # ═══════════════════════════════════════════════════════════════════════════

  # ─────────────────────────────────────────────────────────────
  # #6, #8, #10 — Advanced diagnostics and simulation
  # ─────────────────────────────────────────────────────────────
  production-validation:
    name: 'Tier 3: Production Validation'
    needs: [build-checks]
    uses: ./.github/workflows/_reusable-e2e-tests.yml
    with:
      os_matrix: '["windows-2019", "windows-latest"]'
      run_startup_diagnostics: true
      run_production_simulation: true
      run_installer_test: false  # Needs velopack package

  # ─────────────────────────────────────────────────────────────
  # Package with Velopack (needed for installer test)
  # ─────────────────────────────────────────────────────────────
  package-release:
    name: 'Tier 3: Package Release'
    needs: [build-checks]
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET (for Velopack CLI)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Download build artifacts (windows-latest)
        uses: actions/download-artifact@v4
        with:
          name: release-staging-windows-latest
          path: release-staging

      - name: Add icons
        shell: pwsh
        run: |
          if (Test-Path "app/src-tauri/icons") {
            Copy-Item -Recurse "app/src-tauri/icons" "release-staging/"
          }

      - name: Pack with Velopack (test version)
        shell: pwsh
        run: |
          # Use a test version number
          $version = "0.0.0-test.${{ github.run_number }}"
          
          vpk pack `
            --packId Memento `
            --packVersion $version `
            --packDir release-staging `
            --mainExe memento.exe `
            --outputDir velopack-output `
            --delta None

      - name: Upload Velopack artifacts
        uses: actions/upload-artifact@v4
        with:
          name: velopack-release
          path: velopack-output/*
          retention-days: 3

  # ─────────────────────────────────────────────────────────────
  # #10 — Installer smoke test
  # ─────────────────────────────────────────────────────────────
  installer-test:
    name: 'Tier 3: Installer Smoke Test'
    needs: [package-release]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2019, windows-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET (for Velopack)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Download Velopack package
        uses: actions/download-artifact@v4
        with:
          name: velopack-release
          path: velopack-output

      - name: '#10 Installer smoke test'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          
          Write-Host "=== Installer Smoke Test ==="
          Write-Host "OS: ${{ matrix.os }}"
          Write-Host ""
          
          # Find the setup executable
          $setup = Get-ChildItem "velopack-output" -Filter "*Setup*.exe" | Select-Object -First 1
          
          if (-not $setup) {
            Write-Host "::error::No Setup executable found in velopack-output"
            Get-ChildItem "velopack-output" | ForEach-Object { Write-Host "  $($_.Name)" }
            exit 1
          }
          
          Write-Host "Installer: $($setup.Name) ($([math]::Round($setup.Length/1MB, 2)) MB)"
          
          # Verify it's a valid PE file
          $bytes = [System.IO.File]::ReadAllBytes($setup.FullName)
          if ($bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
            Write-Host "::error::Setup file is not a valid PE executable"
            exit 1
          }
          
          Write-Host "✓ Valid PE executable"
          
          # Install to a test location
          $installDir = Join-Path $env:LOCALAPPDATA "MementoCI-Test-$((Get-Random))"
          Write-Host "Installing to: $installDir"
          
          # Run silent install
          try {
            $proc = Start-Process -FilePath $setup.FullName `
              -ArgumentList "--silent", "-d", $installDir `
              -Wait -NoNewWindow -PassThru
            
            if ($proc.ExitCode -ne 0) {
              Write-Host "::warning::Installer exit code: $($proc.ExitCode)"
            }
          } catch {
            Write-Host "::warning::Install exception: $_"
          }
          
          # Check if key files were installed
          Start-Sleep -Seconds 2
          
          $required = @('memento.exe', 'memento-daemon.exe', 'memento-agents.exe', 'service-helper.exe')
          $found = 0
          
          foreach ($file in $required) {
            $path = Join-Path $installDir $file
            if (Test-Path $path) {
              Write-Host "✓ $file"
              $found++
            } else {
              Write-Host "✗ $file - NOT FOUND"
            }
          }
          
          # Try alternate location (Velopack might install elsewhere)
          if ($found -eq 0) {
            Write-Host ""
            Write-Host "Checking alternate locations..."
            $altPaths = @(
              (Join-Path $env:LOCALAPPDATA "Memento"),
              (Join-Path $env:LOCALAPPDATA "Programs\Memento")
            )
            
            foreach ($alt in $altPaths) {
              if (Test-Path $alt) {
                Write-Host "Found installation at: $alt"
                Get-ChildItem $alt | ForEach-Object { Write-Host "  $($_.Name)" }
                $installDir = $alt
                break
              }
            }
          }
          
          # Quick launch test
          $daemon = Get-ChildItem $installDir -Filter "memento-daemon.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          
          if ($daemon) {
            Write-Host ""
            Write-Host "Testing daemon launch..."
            
            $testDataDir = Join-Path $env:TEMP "memento-installer-test-$((Get-Random))"
            New-Item -ItemType Directory -Force -Path $testDataDir | Out-Null
            
            $pinfo = New-Object System.Diagnostics.ProcessStartInfo
            $pinfo.FileName = $daemon.FullName
            $pinfo.Arguments = "--dev"
            $pinfo.UseShellExecute = $false
            $pinfo.RedirectStandardError = $true
            $pinfo.WorkingDirectory = $daemon.DirectoryName
            $pinfo.EnvironmentVariables["MEMENTO_DATA_DIR"] = $testDataDir
            
            $process = New-Object System.Diagnostics.Process
            $process.StartInfo = $pinfo
            $process.Start() | Out-Null
            
            # Wait for health
            $healthUrl = "http://localhost:4171/api/v1/health"
            $healthy = $false
            
            for ($i = 1; $i -le 15; $i++) {
              Start-Sleep -Seconds 1
              try {
                $response = Invoke-RestMethod -Uri $healthUrl -TimeoutSec 2 -ErrorAction SilentlyContinue
                if ($response) {
                  Write-Host "✓ Daemon healthy after install"
                  $healthy = $true
                  break
                }
              } catch {}
            }
            
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
            Remove-Item -Recurse -Force $testDataDir -ErrorAction SilentlyContinue
            
            if (-not $healthy) {
              Write-Host "::warning::Daemon did not become healthy (may be expected in CI)"
            }
          }
          
          # Cleanup
          Remove-Item -Recurse -Force $installDir -ErrorAction SilentlyContinue
          
          Write-Host ""
          Write-Host "✓ Installer smoke test completed"

  # ─────────────────────────────────────────────────────────────
  # Summary job for branch protection
  # ─────────────────────────────────────────────────────────────
  tier3-summary:
    name: 'Tier 3 Summary'
    needs: [lint-checks, unit-tests, build-checks, e2e-smoke, production-validation, installer-test]
    runs-on: windows-latest
    if: always()
    steps:
      - name: Check all jobs passed
        shell: pwsh
        run: |
          $results = @{
            # Tier 1
            "lint-checks" = "${{ needs.lint-checks.result }}"
            "unit-tests" = "${{ needs.unit-tests.result }}"
            # Tier 2
            "build-checks" = "${{ needs.build-checks.result }}"
            "e2e-smoke" = "${{ needs.e2e-smoke.result }}"
            # Tier 3
            "production-validation" = "${{ needs.production-validation.result }}"
            "installer-test" = "${{ needs.installer-test.result }}"
          }
          
          Write-Host "=== Tier 3 Test Branch Check Results ==="
          Write-Host ""
          Write-Host "Tier 1 (inherited):"
          foreach ($job in @("lint-checks", "unit-tests")) {
            $icon = if ($results[$job] -eq 'success') { '✓' } elseif ($results[$job] -eq 'skipped') { '○' } else { '✗' }
            Write-Host "  $icon $job : $($results[$job])"
          }
          
          Write-Host ""
          Write-Host "Tier 2 (inherited):"
          foreach ($job in @("build-checks", "e2e-smoke")) {
            $icon = if ($results[$job] -eq 'success') { '✓' } elseif ($results[$job] -eq 'skipped') { '○' } else { '✗' }
            Write-Host "  $icon $job : $($results[$job])"
          }
          
          Write-Host ""
          Write-Host "Tier 3 (additional):"
          foreach ($job in @("production-validation", "installer-test")) {
            $icon = if ($results[$job] -eq 'success') { '✓' } elseif ($results[$job] -eq 'skipped') { '○' } else { '✗' }
            Write-Host "  $icon $job : $($results[$job])"
          }
          
          $failed = @()
          foreach ($job in $results.Keys) {
            $status = $results[$job]
            if ($status -ne 'success' -and $status -ne 'skipped') {
              $failed += $job
            }
          }
          
          if ($failed.Count -gt 0) {
            Write-Host ""
            Write-Host "::error::Tier 3 checks failed: $($failed -join ', ')"
            exit 1
          }
          
          Write-Host ""
          Write-Host "✓ All Tier 3 checks passed - ready for main merge"
