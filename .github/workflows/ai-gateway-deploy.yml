name: AI Gateway - Build and Deploy

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'ai-gateway/**'
      - 'shared/**'
      - '.github/workflows/ai-gateway-deploy.yml'
  pull_request:
    paths:
      - 'ai-gateway/**'
      - 'shared/**'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to EC2 after build'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set lowercase image name
        id: image
        run: echo "name=$(echo '${{ env.REGISTRY }}/${{ github.repository }}/ai-gateway' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./ai-gateway/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
      
      # Attestation requires additional permissions - commented out for now
      # - name: Generate artifact attestation
      #   uses: actions/attest-build-provenance@v1
      #   with:
      #     subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      #     subject-digest: ${{ steps.build.outputs.digest }}
      #     push-to-registry: true

  deploy-to-ec2:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy == true)
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set lowercase image name
        id: image
        run: echo "name=$(echo 'ghcr.io/${{ github.repository }}/ai-gateway' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      
      - name: Deploy to EC2 via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER || 'ec2-user' }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_ACTOR: ${{ github.actor }}
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts
          
          # Deploy script - export variables to remote
          ssh $EC2_USER@$EC2_HOST "bash -s" << EOF
            set -e
            
            # Login to GitHub Container Registry
            echo '$GITHUB_TOKEN' | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin
            
            # Pull latest image
            docker pull $IMAGE_NAME:latest
            
            # Stop and remove old container
            docker stop ai-gateway 2>/dev/null || true
            docker rm ai-gateway 2>/dev/null || true
            
            # Run new container
            docker run -d \
              --name ai-gateway \
              --restart unless-stopped \
              -p 4180:4180 \
              --env-file /home/$EC2_USER/ai-gateway/.env \
              --network ai-gateway-network \
              $IMAGE_NAME:latest
            
            # Cleanup old images
            docker image prune -af
            
            # Health check
            echo "Waiting for health check..."
            sleep 10
            curl -f http://localhost:4180/health || exit 1
            echo "Deployment successful!"
          EOF
      
      # Uncomment if you want Slack notifications
      # - name: Slack Notification
      #   if: always()
