# ═══════════════════════════════════════════════════════════════════════════
# TIER 4 — main (full CI run)
# ═══════════════════════════════════════════════════════════════════════════
# Windows 10 + 11 matrix · all 10 checks · required to pass
# Everything from all tiers above, nothing skipped.
#
# By the time a commit reaches main, it has passed every gate.
# Each tier accumulates the layer above it — no gate runs twice.
#
# This workflow runs on push to main and ensures all checks pass
# before builds proceed. For releases, use the workflow_dispatch
# on build-release.yml after this passes.
# ═══════════════════════════════════════════════════════════════════════════

name: 'CI: Tier 4 - Main'

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: tier4-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel main builds

env:
  OS_MATRIX: '["windows-2019", "windows-latest"]'

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # TIER 1 CHECKS — Static analysis, lint, unit tests
  # #9, #3, #4, #2
  # ═══════════════════════════════════════════════════════════════════════════
  
  lint-checks:
    name: 'Tier 1: Lint & Static Analysis'
    uses: ./.github/workflows/_reusable-lint-checks.yml
    with:
      fail_fast: false  # Run all checks on main

  unit-tests:
    name: 'Tier 1: Unit & Contract Tests'
    uses: ./.github/workflows/_reusable-unit-tests.yml
    with:
      os_matrix: '["windows-2019", "windows-latest"]'

  # ═══════════════════════════════════════════════════════════════════════════
  # TIER 2 CHECKS — Build validation, E2E smoke
  # #7, #5, #1
  # ═══════════════════════════════════════════════════════════════════════════

  build-checks:
    name: 'Tier 2: Build & Binary Check'
    needs: [lint-checks]
    uses: ./.github/workflows/_reusable-build-checks.yml
    with:
      os_matrix: '["windows-2019", "windows-latest"]'
      upload_artifacts: true

  e2e-smoke:
    name: 'Tier 2: E2E Smoke Test'
    needs: [build-checks]
    uses: ./.github/workflows/_reusable-e2e-tests.yml
    with:
      os_matrix: '["windows-2019", "windows-latest"]'
      run_installer_test: false
      run_production_simulation: false
      run_startup_diagnostics: false

  # ═══════════════════════════════════════════════════════════════════════════
  # TIER 3 CHECKS — Production simulation, diagnostics
  # #6, #8, #10
  # ═══════════════════════════════════════════════════════════════════════════

  production-validation:
    name: 'Tier 3: Production Validation'
    needs: [build-checks]
    uses: ./.github/workflows/_reusable-e2e-tests.yml
    with:
      os_matrix: '["windows-2019", "windows-latest"]'
      run_startup_diagnostics: true
      run_production_simulation: true
      run_installer_test: false

  # Package for installer test
  package-test:
    name: 'Tier 3: Package Test Build'
    needs: [build-checks]
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET (for Velopack CLI)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-staging-windows-latest
          path: release-staging

      - name: Add icons
        shell: pwsh
        run: |
          if (Test-Path "app/src-tauri/icons") {
            Copy-Item -Recurse "app/src-tauri/icons" "release-staging/"
          }

      - name: Pack with Velopack
        shell: pwsh
        run: |
          $version = "0.0.0-main.${{ github.run_number }}"
          vpk pack `
            --packId Memento `
            --packVersion $version `
            --packDir release-staging `
            --mainExe memento.exe `
            --outputDir velopack-output `
            --delta None

      - name: Upload test package
        uses: actions/upload-artifact@v4
        with:
          name: velopack-test
          path: velopack-output/*
          retention-days: 1

  # Installer smoke test
  installer-test:
    name: 'Tier 3: Installer Test (${{ matrix.os }})'
    needs: [package-test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2019, windows-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Download test package
        uses: actions/download-artifact@v4
        with:
          name: velopack-test
          path: velopack-output

      - name: '#10 Installer smoke test'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          
          Write-Host "=== Installer Smoke Test (Tier 4 - Main) ==="
          Write-Host "OS: ${{ matrix.os }}"
          
          $setup = Get-ChildItem "velopack-output" -Filter "*Setup*.exe" | Select-Object -First 1
          if (-not $setup) {
            Write-Host "::error::No Setup executable found"
            exit 1
          }
          
          Write-Host "Installer: $($setup.Name)"
          
          # Verify PE header
          $bytes = [System.IO.File]::ReadAllBytes($setup.FullName)
          if ($bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
            Write-Host "::error::Invalid PE executable"
            exit 1
          }
          
          Write-Host "✓ Valid PE executable"
          
          # Quick test: verify nupkg exists
          $nupkg = Get-ChildItem "velopack-output" -Filter "*.nupkg" | Select-Object -First 1
          if ($nupkg) {
            Write-Host "✓ Package: $($nupkg.Name)"
          }
          
          Write-Host "✓ Installer smoke test passed"

  # ═══════════════════════════════════════════════════════════════════════════
  # TIER 4 SUMMARY — All checks must pass
  # ═══════════════════════════════════════════════════════════════════════════

  tier4-summary:
    name: 'Tier 4 Summary'
    needs: [lint-checks, unit-tests, build-checks, e2e-smoke, production-validation, installer-test]
    runs-on: windows-latest
    if: always()
    
    steps:
      - name: Evaluate all tiers
        shell: pwsh
        run: |
          $results = @{
            # Tier 1
            "lint-checks" = "${{ needs.lint-checks.result }}"
            "unit-tests" = "${{ needs.unit-tests.result }}"
            # Tier 2
            "build-checks" = "${{ needs.build-checks.result }}"
            "e2e-smoke" = "${{ needs.e2e-smoke.result }}"
            # Tier 3
            "production-validation" = "${{ needs.production-validation.result }}"
            "installer-test" = "${{ needs.installer-test.result }}"
          }
          
          Write-Host "═══════════════════════════════════════════════════════════════"
          Write-Host "                    TIER 4 - MAIN BRANCH RESULTS"
          Write-Host "═══════════════════════════════════════════════════════════════"
          Write-Host ""
          
          # Group by tier
          $tiers = @{
            "Tier 1 (Static/Unit)" = @("lint-checks", "unit-tests")
            "Tier 2 (Build/E2E)" = @("build-checks", "e2e-smoke")
            "Tier 3 (Production)" = @("production-validation", "installer-test")
          }
          
          $allPassed = $true
          $failed = @()
          
          foreach ($tier in $tiers.Keys | Sort-Object) {
            Write-Host "$tier :"
            foreach ($job in $tiers[$tier]) {
              $status = $results[$job]
              $icon = switch ($status) {
                'success' { '✓' }
                'skipped' { '○' }
                'cancelled' { '⊘' }
                default { '✗' }
              }
              Write-Host "  $icon $job : $status"
              
              if ($status -ne 'success' -and $status -ne 'skipped') {
                $failed += "$tier/$job"
                $allPassed = $false
              }
            }
            Write-Host ""
          }
          
          Write-Host "═══════════════════════════════════════════════════════════════"
          
          if (-not $allPassed) {
            Write-Host ""
            Write-Host "::error::TIER 4 FAILED - Main branch checks did not pass"
            Write-Host "Failed checks: $($failed -join ', ')"
            Write-Host ""
            Write-Host "DO NOT merge to main without all checks passing."
            Write-Host "Review the failed jobs above and fix the issues."
            exit 1
          }
          
          Write-Host ""
          Write-Host "✓ ALL TIER 4 CHECKS PASSED"
          Write-Host ""
          Write-Host "This commit has passed all CI gates:"
          Write-Host "  • #9  Anti-pattern grep"
          Write-Host "  • #3  ESLint invoke rules"
          Write-Host "  • #4  Helper usage enforcement"
          Write-Host "  • #2  Daemon mode contract tests"
          Write-Host "  • #7  Windows 10+11 matrix build"
          Write-Host "  • #5  Binary presence check"
          Write-Host "  • #1  E2E smoke test"
          Write-Host "  • #6  Startup diagnostics"
          Write-Host "  • #8  Production simulation"
          Write-Host "  • #10 Installer smoke test"
          Write-Host ""
          Write-Host "Ready for release via workflow_dispatch on build-release.yml"
