# Reusable workflow: Build and binary presence checks
# Called by tier workflows - validates build artifacts

name: Build Checks

on:
  workflow_call:
    inputs:
      os_matrix:
        description: 'JSON array of OS versions ["windows-2019", "windows-latest"]'
        type: string
        default: '["windows-latest"]'
      upload_artifacts:
        description: 'Upload build artifacts'
        type: boolean
        default: false

jobs:
  # ─────────────────────────────────────────────────────────────
  # #7 — Windows 10 + 11 matrix build
  # Build all components on both OS versions
  # ─────────────────────────────────────────────────────────────
  build-all-components:
    name: '#7 Build Components (${{ matrix.os }})'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(inputs.os_matrix) }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            app/frontend/package-lock.json
            app/agents/package-lock.json
            shared/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      # Build frontend
      - name: Install shared dependencies
        run: cd shared && npm ci

      - name: Install app dependencies  
        run: cd app && npm ci

      - name: Install frontend dependencies
        run: cd app/frontend && npm ci

      - name: Build frontend
        run: cd app/frontend && npm run build

      # Build agents
      - name: Install agents dependencies
        run: cd app/agents && npm ci

      - name: Build agents
        run: cd app/agents && npm run build:exe

      # Build Rust components
      - name: Build daemon
        run: cargo build --release -p memento-daemon

      - name: Build service-helper
        run: cargo build --release -p service-helper

      # Build Tauri (needs all above)
      - name: Prepare agents for Tauri
        shell: pwsh
        run: |
          Copy-Item "app/agents/dist/memento-agents.exe" `
            "app/agents/dist/memento-agents-x86_64-pc-windows-msvc.exe" -Force

      - name: Build Tauri app
        run: cd app && npm exec tauri build -- --no-bundle --config src-tauri/tauri.ci.conf.json

      # Collect artifacts
      - name: Prepare release staging
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-staging
          
          Copy-Item "target/release/tauri-app.exe" "release-staging/memento.exe" -ErrorAction Stop
          Copy-Item "target/release/memento-daemon.exe" "release-staging/" -ErrorAction Stop
          Copy-Item "app/agents/dist/memento-agents.exe" "release-staging/" -ErrorAction Stop
          Copy-Item "target/release/service-helper.exe" "release-staging/" -ErrorAction Stop
          
          # Optional DirectML
          $ortDir = Get-ChildItem -Path "$env:LOCALAPPDATA\ort.pyke.io\dfbin\x86_64-pc-windows-msvc" `
            -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($ortDir) {
            $dml = Join-Path $ortDir.FullName "DirectML.dll"
            if (Test-Path $dml) {
              Copy-Item $dml "release-staging/"
              Write-Host "Included DirectML.dll"
            }
          }

      # ─────────────────────────────────────────────────────────────
      # #5 — Release-binary presence check  
      # After packaging, assert required executables exist
      # ─────────────────────────────────────────────────────────────
      - name: '#5 Verify binary presence'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $requiredBinaries = @(
            'memento.exe',
            'memento-daemon.exe',
            'memento-agents.exe',
            'service-helper.exe'
          )
          
          $stagingDir = 'release-staging'
          $missingBinaries = @()
          $foundBinaries = @()
          
          foreach ($binary in $requiredBinaries) {
            $path = Join-Path $stagingDir $binary
            if (Test-Path $path) {
              $size = (Get-Item $path).Length
              $foundBinaries += "$binary ($([math]::Round($size/1MB, 2)) MB)"
            } else {
              $missingBinaries += $binary
            }
          }
          
          Write-Host "=== Binary Presence Check ==="
          Write-Host "OS: ${{ matrix.os }}"
          Write-Host ""
          Write-Host "Found binaries:"
          foreach ($b in $foundBinaries) {
            Write-Host "  ✓ $b"
          }
          
          # Check optional binaries
          $optionalBinaries = @('DirectML.dll')
          foreach ($binary in $optionalBinaries) {
            $path = Join-Path $stagingDir $binary
            if (Test-Path $path) {
              $size = (Get-Item $path).Length
              Write-Host "  ✓ $binary ($([math]::Round($size/1MB, 2)) MB) [optional]"
            } else {
              Write-Host "  ○ $binary [optional, not present]"
            }
          }
          
          if ($missingBinaries.Count -gt 0) {
            Write-Host ""
            Write-Host "::error::Missing required binaries:"
            foreach ($b in $missingBinaries) {
              Write-Host "  ✗ $b"
            }
            Write-Host ""
            Write-Host "Contents of $stagingDir :"
            Get-ChildItem $stagingDir | ForEach-Object { Write-Host "  $($_.Name)" }
            exit 1
          }
          
          Write-Host ""
          Write-Host "✓ All required binaries present"

      - name: Upload build artifacts
        if: ${{ inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: release-staging-${{ matrix.os }}
          path: release-staging/
          retention-days: 5
