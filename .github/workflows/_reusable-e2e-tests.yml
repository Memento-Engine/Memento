# Reusable workflow: E2E and integration tests
# Called by Tier 2+ workflows - heavier tests requiring built artifacts

name: E2E Tests

on:
  workflow_call:
    inputs:
      os_matrix:
        description: 'JSON array of OS versions'
        type: string
        default: '["windows-latest"]'
      run_installer_test:
        description: 'Run installer smoke test (#10)'
        type: boolean
        default: false
      run_production_simulation:
        description: 'Run production simulation (#8)'
        type: boolean  
        default: false
      run_startup_diagnostics:
        description: 'Run startup path diagnostics (#6)'
        type: boolean
        default: false

jobs:
  # ─────────────────────────────────────────────────────────────
  # #1 — E2E smoke test (production build, headless)
  # Build release artifact → launch packaged app headless →
  # assert daemon starts + health endpoint responds →
  # fail on `Os error 3` in logs
  # ─────────────────────────────────────────────────────────────
  e2e-smoke-test:
    name: '#1 E2E Smoke Test (${{ matrix.os }})'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(inputs.os_matrix) }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-staging-${{ matrix.os }}
          path: release-staging

      - name: E2E smoke test
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          
          Write-Host "=== E2E Smoke Test ==="
          Write-Host "OS: ${{ matrix.os }}"
          Write-Host ""
          
          $stagingDir = "release-staging"
          $daemon = Join-Path $stagingDir "memento-daemon.exe"
          $agents = Join-Path $stagingDir "memento-agents.exe"
          
          # Verify binaries exist
          if (-not (Test-Path $daemon)) {
            throw "Daemon binary not found: $daemon"
          }
          if (-not (Test-Path $agents)) {
            throw "Agents binary not found: $agents"
          }
          
          # Create temp data directory
          $testDataDir = Join-Path $env:TEMP "memento-e2e-test-$(Get-Random)"
          New-Item -ItemType Directory -Force -Path $testDataDir | Out-Null
          
          $logFile = Join-Path $testDataDir "daemon.log"
          
          Write-Host "Starting daemon in dev mode for testing..."
          Write-Host "  Binary: $daemon"
          Write-Host "  Data dir: $testDataDir"
          
          # Start daemon in background
          $pinfo = New-Object System.Diagnostics.ProcessStartInfo
          $pinfo.FileName = $daemon
          $pinfo.Arguments = "--dev"
          $pinfo.UseShellExecute = $false
          $pinfo.RedirectStandardOutput = $true
          $pinfo.RedirectStandardError = $true
          $pinfo.WorkingDirectory = $stagingDir
          $pinfo.EnvironmentVariables["MEMENTO_DATA_DIR"] = $testDataDir
          
          $process = New-Object System.Diagnostics.Process
          $process.StartInfo = $pinfo
          $process.Start() | Out-Null
          
          $daemonPid = $process.Id
          Write-Host "Daemon started with PID: $daemonPid"
          
          # Wait for daemon to be ready (check health endpoint)
          $healthUrl = "http://localhost:4171/api/v1/health"
          $maxAttempts = 30
          $healthy = $false
          
          for ($i = 1; $i -le $maxAttempts; $i++) {
            Start-Sleep -Seconds 1
            try {
              $response = Invoke-RestMethod -Uri $healthUrl -TimeoutSec 2 -ErrorAction SilentlyContinue
              if ($response) {
                Write-Host "Health check passed on attempt $i"
                $healthy = $true
                break
              }
            } catch {
              Write-Host "Attempt $i : waiting for daemon..."
            }
          }
          
          # Capture any output before stopping
          try {
            $stdout = $process.StandardOutput.ReadToEnd()
            $stderr = $process.StandardError.ReadToEnd()
            
            if ($stdout) {
              $stdout | Out-File -FilePath $logFile -Append
            }
            if ($stderr) {
              $stderr | Out-File -FilePath $logFile -Append
            }
          } catch {}
          
          # Stop daemon
          try {
            Stop-Process -Id $daemonPid -Force -ErrorAction SilentlyContinue
          } catch {}
          
          # Check for critical errors in logs
          $criticalPatterns = @(
            'Os error 3',           # Missing path/file
            'Os error 5',           # Access denied
            'ENOENT',               # Node.js file not found
            'Cannot find module',   # Missing JS module
            'EPERM'                 # Permission error
          )
          
          $logContent = ""
          if (Test-Path $logFile) {
            $logContent = Get-Content $logFile -Raw
          }
          
          $hasErrors = $false
          foreach ($pattern in $criticalPatterns) {
            if ($logContent -match $pattern) {
              Write-Host "::error::Critical error pattern found in logs: $pattern"
              $hasErrors = $true
            }
          }
          
          if ($hasErrors) {
            Write-Host ""
            Write-Host "=== Daemon Log Output ==="
            Get-Content $logFile -ErrorAction SilentlyContinue
            Write-Host "========================="
            exit 1
          }
          
          if (-not $healthy) {
            Write-Host "::error::Daemon failed to become healthy within $maxAttempts seconds"
            if (Test-Path $logFile) {
              Write-Host ""
              Write-Host "=== Daemon Log Output ==="
              Get-Content $logFile
              Write-Host "========================="
            }
            exit 1
          }
          
          # Cleanup
          Remove-Item -Recurse -Force $testDataDir -ErrorAction SilentlyContinue
          
          Write-Host ""
          Write-Host "✓ E2E smoke test passed"

  # ─────────────────────────────────────────────────────────────
  # #6 — Startup-path diagnostics
  # Log exact spawn command + cwd before daemon launch;
  # CI parses structured logs and fails on missing-path signatures
  # ─────────────────────────────────────────────────────────────
  startup-diagnostics:
    name: '#6 Startup Path Diagnostics (${{ matrix.os }})'
    if: ${{ inputs.run_startup_diagnostics }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(inputs.os_matrix) }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-staging-${{ matrix.os }}
          path: release-staging

      - name: Startup path diagnostics
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          
          Write-Host "=== Startup Path Diagnostics ==="
          Write-Host "OS: ${{ matrix.os }}"
          
          $stagingDir = "release-staging"
          
          # Enumerate all binaries and their full paths
          Write-Host ""
          Write-Host "Binary locations:"
          $binaries = @('memento.exe', 'memento-daemon.exe', 'memento-agents.exe', 'service-helper.exe')
          foreach ($bin in $binaries) {
            $path = Join-Path $stagingDir $bin
            if (Test-Path $path) {
              $fullPath = (Resolve-Path $path).Path
              Write-Host "  $bin : $fullPath"
            } else {
              Write-Host "  $bin : NOT FOUND"
            }
          }
          
          # Check expected ProgramData paths
          Write-Host ""
          Write-Host "Expected production paths:"
          $programData = $env:ProgramData
          $mementoDir = Join-Path $programData "memento"
          
          $expectedPaths = @(
            (Join-Path $mementoDir "db"),
            (Join-Path $mementoDir "logs"),
            (Join-Path $mementoDir "ports")
          )
          
          foreach ($p in $expectedPaths) {
            Write-Host "  $p"
          }
          
          # Simulate what the Tauri app would do
          Write-Host ""
          Write-Host "Simulating daemon spawn (dev mode)..."
          
          $daemon = Join-Path $stagingDir "memento-daemon.exe"
          $cwd = (Get-Location).Path
          
          # Log the exact command that would be run
          $spawnInfo = @{
            "command" = $daemon
            "args" = @("--dev")
            "cwd" = $cwd
            "PATH" = $env:PATH.Split(';') | Select-Object -First 5
          }
          
          Write-Host "Spawn command: $($spawnInfo.command)"
          Write-Host "Args: $($spawnInfo.args -join ' ')"
          Write-Host "CWD: $($spawnInfo.cwd)"
          
          # Check for missing path signatures
          $missingPathSignatures = @(
            'The system cannot find the path specified',
            'The system cannot find the file specified',
            'Os error 3',
            'Os error 2'
          )
          
          # Quick validation: run daemon with --help or version to check it loads
          try {
            $output = & $daemon --help 2>&1 | Out-String
            Write-Host ""
            Write-Host "Daemon help output (first 500 chars):"
            Write-Host $output.Substring(0, [Math]::Min(500, $output.Length))
          } catch {
            $errMsg = $_.Exception.Message
            foreach ($sig in $missingPathSignatures) {
              if ($errMsg -match $sig) {
                Write-Host "::error::Missing path signature detected: $sig"
                Write-Host "Error: $errMsg"
                exit 1
              }
            }
          }
          
          Write-Host ""
          Write-Host "✓ Startup path diagnostics passed"

  # ─────────────────────────────────────────────────────────────
  # #8 — Production simulation stage
  # Run with prod flags + release binaries, never `tauri dev`.
  # Verify ProgramData paths and service start behavior.
  # ─────────────────────────────────────────────────────────────
  production-simulation:
    name: '#8 Production Simulation (${{ matrix.os }})'
    if: ${{ inputs.run_production_simulation }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(inputs.os_matrix) }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-staging-${{ matrix.os }}
          path: release-staging

      - name: Production simulation
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          
          Write-Host "=== Production Simulation ==="
          Write-Host "OS: ${{ matrix.os }}"
          Write-Host ""
          
          $stagingDir = "release-staging"
          $programData = $env:ProgramData
          $mementoDir = Join-Path $programData "memento-ci-test"
          
          # Create production-like directory structure
          $dirs = @(
            (Join-Path $mementoDir "db"),
            (Join-Path $mementoDir "logs"),
            (Join-Path $mementoDir "ports")
          )
          
          foreach ($d in $dirs) {
            New-Item -ItemType Directory -Force -Path $d | Out-Null
            Write-Host "Created: $d"
          }
          
          # Test that daemon can write to ProgramData
          $testFile = Join-Path $mementoDir "logs" "ci-test.log"
          "CI test $(Get-Date)" | Out-File $testFile
          
          if (Test-Path $testFile) {
            Write-Host "✓ Can write to ProgramData/memento"
            Remove-Item $testFile -Force
          } else {
            Write-Host "::error::Cannot write to ProgramData path"
            exit 1
          }
          
          # Verify service-helper exists and has correct manifest
          $serviceHelper = Join-Path $stagingDir "service-helper.exe"
          if (Test-Path $serviceHelper) {
            Write-Host "✓ service-helper.exe present"
            
            # Check if it's a valid PE file
            try {
              $bytes = [System.IO.File]::ReadAllBytes($serviceHelper)
              if ($bytes[0] -eq 0x4D -and $bytes[1] -eq 0x5A) {
                Write-Host "✓ Valid PE executable"
              }
            } catch {
              Write-Host "::warning::Could not validate PE header: $_"
            }
          } else {
            Write-Host "::error::service-helper.exe not found"
            exit 1
          }
          
          # Test that daemon runs in production mode (no --dev flag)
          Write-Host ""
          Write-Host "Testing daemon in production mode (no --dev)..."
          
          $daemon = Join-Path $stagingDir "memento-daemon.exe"
          $prodEnv = @{
            "MEMENTO_DATA_DIR" = $mementoDir
          }
          
          # Start daemon briefly to verify it initializes
          $pinfo = New-Object System.Diagnostics.ProcessStartInfo
          $pinfo.FileName = $daemon
          # NO --dev flag = production mode
          $pinfo.UseShellExecute = $false
          $pinfo.RedirectStandardError = $true
          $pinfo.WorkingDirectory = $stagingDir
          $pinfo.EnvironmentVariables["MEMENTO_DATA_DIR"] = $mementoDir
          
          $process = New-Object System.Diagnostics.Process
          $process.StartInfo = $pinfo
          $process.Start() | Out-Null
          
          Write-Host "Daemon PID: $($process.Id)"
          
          # Give it a few seconds to initialize
          Start-Sleep -Seconds 5
          
          # Check if it's still running
          if (-not $process.HasExited) {
            Write-Host "✓ Daemon running in production mode"
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
          } else {
            $exitCode = $process.ExitCode
            $stderr = $process.StandardError.ReadToEnd()
            Write-Host "Daemon exited with code: $exitCode"
            if ($stderr) {
              Write-Host "Stderr: $stderr"
            }
            # Exit code 0 or 1 might be expected if service isn't installed
            # Check for actual errors
            if ($stderr -match 'Os error 3|Os error 5|ENOENT|Cannot find module') {
              Write-Host "::error::Critical error in production mode"
              exit 1
            }
          }
          
          # Cleanup
          Remove-Item -Recurse -Force $mementoDir -ErrorAction SilentlyContinue
          
          Write-Host ""
          Write-Host "✓ Production simulation passed"

  # ─────────────────────────────────────────────────────────────
  # #10 — Installer smoke test (clean Windows VM)
  # Install packaged artifact fresh → run onboarding →
  # daemon must start → validate log/port files
  # ─────────────────────────────────────────────────────────────
  installer-smoke-test:
    name: '#10 Installer Smoke Test (${{ matrix.os }})'
    if: ${{ inputs.run_installer_test }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(inputs.os_matrix) }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET (for Velopack)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Download Velopack package
        uses: actions/download-artifact@v4
        with:
          name: velopack-release
          path: velopack-output

      - name: Installer smoke test
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          
          Write-Host "=== Installer Smoke Test ==="
          Write-Host "OS: ${{ matrix.os }}"
          Write-Host ""
          
          # Find the setup executable
          $setup = Get-ChildItem "velopack-output" -Filter "*Setup*.exe" | Select-Object -First 1
          
          if (-not $setup) {
            Write-Host "::error::No Setup executable found in velopack-output"
            Get-ChildItem "velopack-output" | ForEach-Object { Write-Host "  $($_.Name)" }
            exit 1
          }
          
          Write-Host "Installer: $($setup.Name)"
          
          # Install to a test location (silent install)
          $installDir = Join-Path $env:LOCALAPPDATA "MementoCI-$((Get-Random))"
          
          Write-Host "Installing to: $installDir"
          
          # Run silent install
          # Note: Velopack Setup.exe uses specific command line args
          $installArgs = @("--silent", "-d", $installDir)
          
          try {
            Start-Process -FilePath $setup.FullName -ArgumentList $installArgs -Wait -NoNewWindow
          } catch {
            Write-Host "::warning::Install process threw exception: $_"
          }
          
          # Verify installation
          $mementoExe = Join-Path $installDir "memento.exe"
          $daemonExe = Join-Path $installDir "memento-daemon.exe"
          $agentsExe = Join-Path $installDir "memento-agents.exe"
          $serviceHelperExe = Join-Path $installDir "service-helper.exe"
          
          $allPresent = $true
          $files = @($mementoExe, $daemonExe, $agentsExe, $serviceHelperExe)
          
          foreach ($f in $files) {
            if (Test-Path $f) {
              Write-Host "✓ $(Split-Path -Leaf $f)"
            } else {
              Write-Host "✗ $(Split-Path -Leaf $f) - NOT FOUND"
              $allPresent = $false
            }
          }
          
          if (-not $allPresent) {
            Write-Host "::error::Not all required files were installed"
            Write-Host ""
            Write-Host "Contents of install directory:"
            Get-ChildItem $installDir -Recurse | ForEach-Object { Write-Host "  $($_.FullName)" }
            exit 1
          }
          
          # Verify ProgramData directory structure was created (or can be created)
          $programData = $env:ProgramData
          $mementoDataDir = Join-Path $programData "memento"
          
          Write-Host ""
          Write-Host "Checking data directories..."
          
          $dataDirs = @("db", "logs", "ports")
          foreach ($d in $dataDirs) {
            $path = Join-Path $mementoDataDir $d
            if (Test-Path $path) {
              Write-Host "✓ $path exists"
            } else {
              # Try to create it
              try {
                New-Item -ItemType Directory -Force -Path $path | Out-Null
                Write-Host "✓ $path created successfully"
                Remove-Item $path -Force
              } catch {
                Write-Host "✗ Cannot create $path : $_"
              }
            }
          }
          
          # Quick daemon start test (dev mode, won't try to use Windows Service)
          Write-Host ""
          Write-Host "Testing daemon startup..."
          
          $testDataDir = Join-Path $env:TEMP "memento-installer-test"
          New-Item -ItemType Directory -Force -Path $testDataDir | Out-Null
          
          $pinfo = New-Object System.Diagnostics.ProcessStartInfo
          $pinfo.FileName = $daemonExe
          $pinfo.Arguments = "--dev"
          $pinfo.UseShellExecute = $false
          $pinfo.RedirectStandardOutput = $true
          $pinfo.RedirectStandardError = $true
          $pinfo.WorkingDirectory = $installDir
          $pinfo.EnvironmentVariables["MEMENTO_DATA_DIR"] = $testDataDir
          
          $process = New-Object System.Diagnostics.Process
          $process.StartInfo = $pinfo
          $process.Start() | Out-Null
          
          # Wait for health check
          $healthUrl = "http://localhost:4171/api/v1/health"
          $healthy = $false
          
          for ($i = 1; $i -le 20; $i++) {
            Start-Sleep -Seconds 1
            try {
              $response = Invoke-RestMethod -Uri $healthUrl -TimeoutSec 2 -ErrorAction SilentlyContinue
              if ($response) {
                Write-Host "✓ Daemon healthy after install"
                $healthy = $true
                break
              }
            } catch {}
          }
          
          # Stop daemon
          Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
          
          # Cleanup
          Remove-Item -Recurse -Force $testDataDir -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force $installDir -ErrorAction SilentlyContinue
          
          if (-not $healthy) {
            Write-Host "::error::Installed daemon failed to become healthy"
            exit 1
          }
          
          Write-Host ""
          Write-Host "✓ Installer smoke test passed"
