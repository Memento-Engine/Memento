# ═══════════════════════════════════════════════════════════════════════════
# TIER 1 — Every PR (all branches)
# ═══════════════════════════════════════════════════════════════════════════
# Fast checks (~2 min), no binaries needed. Catches logic bugs before review.
#
# Checks included:
#   #9 — Anti-pattern grep block
#   #3 — ESLint rule: no raw process.env in invoke payloads
#   #4 — Helper usage grep
#   #2 — Contract test: daemon launch mode mapping
# ═══════════════════════════════════════════════════════════════════════════

name: 'CI: Tier 1 - PR Checks'

on:
  pull_request:
    branches:
      - '**'  # All branches
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: tier1-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Static analysis and lint checks
  # #9, #3, #4
  # ─────────────────────────────────────────────────────────────
  lint-checks:
    name: 'Lint & Static Analysis'
    uses: ./.github/workflows/_reusable-lint-checks.yml
    with:
      fail_fast: true

  # ─────────────────────────────────────────────────────────────
  # Contract and unit tests
  # #2
  # ─────────────────────────────────────────────────────────────
  unit-tests:
    name: 'Unit & Contract Tests'
    uses: ./.github/workflows/_reusable-unit-tests.yml
    with:
      os_matrix: '["windows-latest"]'

  # ─────────────────────────────────────────────────────────────
  # Summary job for branch protection
  # ─────────────────────────────────────────────────────────────
  tier1-summary:
    name: 'Tier 1 Summary'
    needs: [lint-checks, unit-tests]
    runs-on: windows-latest
    if: always()
    steps:
      - name: Check all jobs passed
        shell: pwsh
        run: |
          $results = @{
            "lint-checks" = "${{ needs.lint-checks.result }}"
            "unit-tests" = "${{ needs.unit-tests.result }}"
          }
          
          Write-Host "=== Tier 1 PR Check Results ==="
          $failed = @()
          foreach ($job in $results.Keys) {
            $status = $results[$job]
            $icon = if ($status -eq 'success') { '✓' } elseif ($status -eq 'skipped') { '○' } else { '✗' }
            Write-Host "$icon $job : $status"
            if ($status -ne 'success' -and $status -ne 'skipped') {
              $failed += $job
            }
          }
          
          if ($failed.Count -gt 0) {
            Write-Host ""
            Write-Host "::error::Tier 1 checks failed: $($failed -join ', ')"
            exit 1
          }
          
          Write-Host ""
          Write-Host "✓ All Tier 1 checks passed"
